<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Image Sequence → GIF</title>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>
    <script src="https://unpkg.com/mp4-muxer/build/mp4-muxer.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 10px;
        }

        #topbar {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #trash {
            font-size: 28px;
            cursor: pointer;
            background: white;
            border: 2px dashed #ccc;
            padding: 10px 15px;
            border-radius: 10px;
            transition: 0.2s;
        }

        #trash.active {
            background: #ffdddd;
            border-color: red;
        }

        #preview {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            margin-top: 15px;
        }

        .thumb {
            height: 100px;
            cursor: grab;
        }

        .controls {
            margin-top: 20px;
        }

        input {
            padding: 5px;
            width: 80px;
        }

        button {
            padding: 10px 15px;
            margin-top: 15px;
            cursor: pointer;
        }

        #status {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Image → GIF / Video</h1>

    <div id="topbar">
        <input type="file" id="upload" multiple accept="image/*">
        <div id="trash">🗑️</div>
    </div>

    <div id="preview"></div>

    <div class="controls">
        <label>FPS:</label>
        <input type="number" id="fps" value="2" min="1">
        <span id="duration"></span>
    </div>

    <button id="export">Export GIF</button>
    <button id="export-video">Export Video</button>

    <div id="status"></div>

    <script>
        let images = [];

        const upload = document.getElementById("upload");
        const preview = document.getElementById("preview");
        const fpsInput = document.getElementById("fps");
        const durationText = document.getElementById("duration");
        const status = document.getElementById("status");
        const trash = document.getElementById("trash");

        upload.addEventListener("change", (e) => {
            const files = Array.from(e.target.files);

            files.sort((a, b) => a.name.localeCompare(b.name));

            images = [];
            preview.innerHTML = "";

            files.forEach(file => {
                const img = document.createElement("img");
                img.className = "thumb";
                img.src = URL.createObjectURL(file);

                preview.appendChild(img);
                images.push(img);
            });

            updateDuration();
        });

        // SORTABLE (drag reorder)
        new Sortable(preview, {
            animation: 150,
            onEnd: () => {
                images = Array.from(preview.children);
                updateDuration();
            }
        });

        // FPS
        fpsInput.addEventListener("input", updateDuration);

        function updateDuration() {
            const fps = parseFloat(fpsInput.value) || 1;
            const duration = images.length / fps;
            durationText.textContent = ` | Duration: ${duration.toFixed(2)}s`;
        }

        // 🗑️ CLICK → DELETE ALL
        trash.addEventListener("click", () => {
            if (images.length === 0) return;

            if (confirm("Delete all images?")) {
                preview.innerHTML = "";
                images = [];
                updateDuration();
            }
        });

        // 🗑️ DRAG TO DELETE
        preview.addEventListener("dragstart", (e) => {
            if (e.target.classList.contains("thumb")) {
                e.dataTransfer.setData("text/plain", "image");
                e.target.classList.add("dragging");
            }
        });

        preview.addEventListener("dragend", (e) => {
            if (e.target.classList.contains("thumb")) {
                e.target.classList.remove("dragging");
                trash.classList.remove("active");
            }
        });

        trash.addEventListener("dragover", (e) => {
            e.preventDefault();
            trash.classList.add("active");
        });

        trash.addEventListener("dragleave", () => {
            trash.classList.remove("active");
        });

        trash.addEventListener("drop", (e) => {
            e.preventDefault();
            const dragging = document.querySelector(".dragging");

            if (dragging) {
                dragging.remove();
                images = Array.from(preview.children);
                updateDuration();
            }

            trash.classList.remove("active");
        });

        // EXPORT
        // --- 1. MAXIMUM QUALITY GIF EXPORT ---
        document.getElementById("export").addEventListener("click", async () => {
            if (images.length === 0) {
                alert("Upload images first");
                return;
            }

            const exportBtn = document.getElementById("export");
            exportBtn.disabled = true;
            status.textContent = "Preparing GIF worker...";

            const fps = parseFloat(fpsInput.value) || 1;
            const delay = 1000 / fps;

            try {
                let workerScriptUrl = "gif.worker.js";
                try {
                    const response = await fetch("https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.worker.js");
                    if (response.ok) {
                        const text = await response.text();
                        const blob = new Blob([text], { type: "application/javascript" });
                        workerScriptUrl = URL.createObjectURL(blob);
                    }
                } catch (e) {
                    console.warn("Falling back to local worker file", e);
                }

                status.textContent = "Rendering Maximum Quality GIF... 0%";

                const gif = new GIF({
                    workers: navigator.hardwareConcurrency || 2,
                    quality: 1, // MAXIMUM QUALITY (1 is best, 10 is default)
                    dither: "FloydSteinberg-serpentine", // Smoothes out the 256-color limit
                    workerScript: workerScriptUrl
                });

                const currentImages = Array.from(preview.children);
                let width = currentImages[0].naturalWidth || currentImages[0].width;
                let height = currentImages[0].naturalHeight || currentImages[0].height;

                currentImages.forEach(img => {
                    const canvas = document.createElement("canvas");
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    gif.addFrame(canvas, { delay, copy: true });
                });

                gif.on("progress", p => {
                    status.textContent = `Rendering GIF... ${Math.round(p * 100)}%`;
                });

                gif.on("finished", blob => {
                    const a = document.createElement("a");
                    a.href = URL.createObjectURL(blob);
                    a.download = "animation_max_quality.gif";
                    a.click();
                    status.textContent = "GIF Done!";
                    exportBtn.disabled = false;
                });

                gif.render();
            } catch (error) {
                console.error(error);
                status.textContent = "Error rendering GIF!";
                exportBtn.disabled = false;
            }
        });

        // --- 2. VIRTUALLY LOSSLESS MP4 VIDEO EXPORT (WebCodecs) ---
        document.getElementById("export-video").addEventListener("click", async () => {
            if (images.length === 0) {
                alert("Upload images first");
                return;
            }
            if (typeof VideoEncoder === "undefined") {
                alert("Your browser does not support WebCodecs. Please use a modern version of Chrome or Edge.");
                return;
            }

            const exportBtn = document.getElementById("export-video");
            exportBtn.disabled = true;
            status.textContent = "Encoding pristine MP4 video...";

            const fps = parseFloat(fpsInput.value) || 1;
            const currentImages = Array.from(preview.children);

            try {
                // Get original resolution
                let rawWidth = currentImages[0].naturalWidth || currentImages[0].width;
                let rawHeight = currentImages[0].naturalHeight || currentImages[0].height;

                // H.264 Video Encoders require dimensions to be EVEN numbers
                let width = rawWidth % 2 === 0 ? rawWidth : rawWidth + 1;
                let height = rawHeight % 2 === 0 ? rawHeight : rawHeight + 1;

                // Find a supported resolution by scaling down if necessary, as many hardware encoders fail on 12MP+.
                let scale = 1.0;
                let finalCodecString = 'avc1.640028';
                let supported = false;

                while (scale >= 0.1) {
                    let testWidth = Math.floor((width * scale) / 2) * 2;
                    let testHeight = Math.floor((height * scale) / 2) * 2;

                    const mbs = Math.ceil(testWidth / 16) * Math.ceil(testHeight / 16);
                    let codecString = 'avc1.640028';
                    if (mbs > 8192) codecString = 'avc1.640032';
                    if (mbs > 22080) codecString = 'avc1.640034';
                    if (mbs > 36864) codecString = 'avc1.64003E';

                    const config = {
                        codec: codecString,
                        width: testWidth,
                        height: testHeight,
                        bitrate: 50_000_000,
                        framerate: fps
                    };

                    const support = await VideoEncoder.isConfigSupported(config);
                    if (support.supported) {
                        width = testWidth;
                        height = testHeight;
                        finalCodecString = codecString;
                        supported = true;
                        break;
                    }
                    scale -= 0.05; // Drop by 5% and test again
                }

                if (!supported) {
                    throw new Error("Unable to find a supported video configuration for your browser. Try smaller images.");
                }

                if (scale < 1.0) {
                    status.textContent = `Scaling down to ${width}x${height} to support H.264 limits...`;
                }

                // Setup the MP4 Muxer
                let muxer = new Mp4Muxer.Muxer({
                    target: new Mp4Muxer.ArrayBufferTarget(),
                    video: {
                        codec: 'avc',
                        width: width,
                        height: height
                    },
                    fastStart: 'in-memory'
                });

                // Setup the WebCodecs Video Encoder
                let videoEncoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: e => console.error(e)
                });

                videoEncoder.configure({
                    codec: finalCodecString,
                    width: width,
                    height: height,
                    bitrate: 50_000_000, // Massive 50 Mbps bitrate for visually lossless quality
                    framerate: fps
                });

                const canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d", { willReadFrequently: true });

                // Encode frame by frame
                for (let i = 0; i < currentImages.length; i++) {
                    status.textContent = `Encoding high-res frame ${i + 1} of ${currentImages.length}...`;

                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(currentImages[i], 0, 0, rawWidth, rawHeight);

                    // Calculate precise timestamps (in microseconds)
                    let timestamp_us = (i * 1000000) / fps;
                    let duration_us = 1000000 / fps;

                    let frame = new VideoFrame(canvas, { timestamp: timestamp_us, duration: duration_us });

                    // Force a keyframe every second (or on the first frame if fps is less than 1)
                    let isKeyFrame = i % Math.max(1, Math.floor(fps)) === 0;
                    videoEncoder.encode(frame, { keyFrame: isKeyFrame });
                    frame.close();
                }

                status.textContent = "Finalizing video file...";
                await videoEncoder.flush();
                muxer.finalize();

                // Download the file
                let buffer = muxer.target.buffer;
                let blob = new Blob([buffer], { type: 'video/mp4' });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = "animation_lossless.mp4";
                a.click();

                status.textContent = "Video export complete!";
                exportBtn.disabled = false;

            } catch (error) {
                console.error(error);
                status.textContent = "Error encoding Video!";
                exportBtn.disabled = false;
            }
        });
    </script>

</body>

</html>
