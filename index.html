<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Sequence → GIF</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    margin-bottom: 10px;
}

#topbar {
    display: flex;
    align-items: center;
    gap: 20px;
}

#trash {
    font-size: 28px;
    cursor: pointer;
    background: white;
    border: 2px dashed #ccc;
    padding: 10px 15px;
    border-radius: 10px;
    transition: 0.2s;
}

#trash.active {
    background: #ffdddd;
    border-color: red;
}

#preview {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 10px;
    background: white;
    border: 1px solid #ddd;
    margin-top: 15px;
}

.thumb {
    height: 100px;
    cursor: grab;
}

.controls {
    margin-top: 20px;
}

input {
    padding: 5px;
    width: 80px;
}

button {
    padding: 10px 15px;
    margin-top: 15px;
    cursor: pointer;
}

#status {
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>Image Sequence → GIF</h1>

<div id="topbar">
    <input type="file" id="upload" multiple accept="image/*">
    <div id="trash">🗑️</div>
</div>

<div id="preview"></div>

<div class="controls">
    <label>FPS:</label>
    <input type="number" id="fps" value="2" min="1">
    <span id="duration"></span>
</div>

<button id="export">Export GIF</button>

<div id="status"></div>

<script>
let images = [];

const upload = document.getElementById("upload");
const preview = document.getElementById("preview");
const fpsInput = document.getElementById("fps");
const durationText = document.getElementById("duration");
const status = document.getElementById("status");
const trash = document.getElementById("trash");

const MAX_SIZE = 800; // 🔥 key optimization

upload.addEventListener("change", (e) => {
    const files = Array.from(e.target.files);
    files.sort((a, b) => a.name.localeCompare(b.name));

    images = [];
    preview.innerHTML = "";

    files.forEach(file => {
        const img = document.createElement("img");
        img.className = "thumb";
        img.src = URL.createObjectURL(file);

        preview.appendChild(img);
        images.push(img);
    });

    updateDuration();
});

// drag sorting
new Sortable(preview, {
    animation: 150,
    onEnd: () => {
        images = Array.from(preview.children);
        updateDuration();
    }
});

fpsInput.addEventListener("input", updateDuration);

function updateDuration() {
    const fps = parseFloat(fpsInput.value) || 1;
    const duration = images.length / fps;
    durationText.textContent = ` | Duration: ${duration.toFixed(2)}s`;
}

// 🗑️ clear all
trash.addEventListener("click", () => {
    if (!images.length) return;

    if (confirm("Delete all images?")) {
        preview.innerHTML = "";
        images = [];
        updateDuration();
    }
});

// drag delete
preview.addEventListener("dragstart", (e) => {
    if (e.target.classList.contains("thumb")) {
        e.target.classList.add("dragging");
    }
});

preview.addEventListener("dragend", (e) => {
    e.target.classList.remove("dragging");
    trash.classList.remove("active");
});

trash.addEventListener("dragover", (e) => {
    e.preventDefault();
    trash.classList.add("active");
});

trash.addEventListener("dragleave", () => {
    trash.classList.remove("active");
});

trash.addEventListener("drop", (e) => {
    e.preventDefault();
    const dragging = document.querySelector(".dragging");

    if (dragging) {
        dragging.remove();
        images = Array.from(preview.children);
        updateDuration();
    }

    trash.classList.remove("active");
});

// 🔥 RESIZE FUNCTION (CRITICAL FIX)
function drawToCanvas(img) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    let w = img.naturalWidth;
    let h = img.naturalHeight;

    if (w > MAX_SIZE || h > MAX_SIZE) {
        const scale = Math.min(MAX_SIZE / w, MAX_SIZE / h);
        w *= scale;
        h *= scale;
    }

    canvas.width = w;
    canvas.height = h;

    ctx.drawImage(img, 0, 0, w, h);
    return canvas;
}

// 🚀 EXPORT (FIXED)
document.getElementById("export").addEventListener("click", async () => {
    if (images.length === 0) {
        alert("Upload images first");
        return;
    }

    const fps = parseFloat(fpsInput.value) || 1;
    const delay = 1000 / fps;

    status.textContent = "Preparing images...";

    const gif = new GIF({
        workers: 2,
        quality: 10,
        workerScript: "https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.worker.js"
    });

    let processed = 0;

    for (let i = 0; i < images.length; i++) {
        const img = images[i];

        await new Promise(resolve => {
            const temp = new Image();
            temp.src = img.src;

            temp.onload = () => {
                const canvas = drawToCanvas(temp);
                gif.addFrame(canvas, { delay });

                processed++;
                status.textContent = `Processing ${processed}/${images.length}`;
                resolve();
            };
        });
    }

    status.textContent = "Rendering GIF...";

    gif.on("progress", p => {
        status.textContent = `Rendering: ${Math.round(p * 100)}%`;
    });

    gif.on("finished", blob => {
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "output.gif";
        a.click();

        status.textContent = "Done!";
    });

    gif.render();
});
</script>

</body>
</html>
