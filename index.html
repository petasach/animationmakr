<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Image Sequence → GIF</title>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 10px;
        }

        #topbar {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #trash {
            font-size: 28px;
            cursor: pointer;
            background: white;
            border: 2px dashed #ccc;
            padding: 10px 15px;
            border-radius: 10px;
            transition: 0.2s;
        }

        #trash.active {
            background: #ffdddd;
            border-color: red;
        }

        #preview {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 10px;
            background: white;
            border: 1px solid #ddd;
            margin-top: 15px;
        }

        .thumb {
            height: 100px;
            cursor: grab;
        }

        .controls {
            margin-top: 20px;
        }

        input {
            padding: 5px;
            width: 80px;
        }

        button {
            padding: 10px 15px;
            margin-top: 15px;
            cursor: pointer;
        }

        #status {
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>Image → GIF / Video</h1>

    <div id="topbar">
        <input type="file" id="upload" multiple accept="image/*">
        <div id="trash">🗑️</div>
    </div>

    <div id="preview"></div>

    <div class="controls">
        <label>FPS:</label>
        <input type="number" id="fps" value="2" min="1">
        <span id="duration"></span>
    </div>

    <button id="export">Export GIF</button>
    <button id="export-video">Export Video</button>

    <div id="status"></div>

    <script>
        let images = [];

        const upload = document.getElementById("upload");
        const preview = document.getElementById("preview");
        const fpsInput = document.getElementById("fps");
        const durationText = document.getElementById("duration");
        const status = document.getElementById("status");
        const trash = document.getElementById("trash");

        upload.addEventListener("change", (e) => {
            const files = Array.from(e.target.files);

            files.sort((a, b) => a.name.localeCompare(b.name));

            images = [];
            preview.innerHTML = "";

            files.forEach(file => {
                const img = document.createElement("img");
                img.className = "thumb";
                img.src = URL.createObjectURL(file);

                preview.appendChild(img);
                images.push(img);
            });

            updateDuration();
        });

        // SORTABLE (drag reorder)
        new Sortable(preview, {
            animation: 150,
            onEnd: () => {
                images = Array.from(preview.children);
                updateDuration();
            }
        });

        // FPS
        fpsInput.addEventListener("input", updateDuration);

        function updateDuration() {
            const fps = parseFloat(fpsInput.value) || 1;
            const duration = images.length / fps;
            durationText.textContent = ` | Duration: ${duration.toFixed(2)}s`;
        }

        // 🗑️ CLICK → DELETE ALL
        trash.addEventListener("click", () => {
            if (images.length === 0) return;

            if (confirm("Delete all images?")) {
                preview.innerHTML = "";
                images = [];
                updateDuration();
            }
        });

        // 🗑️ DRAG TO DELETE
        preview.addEventListener("dragstart", (e) => {
            if (e.target.classList.contains("thumb")) {
                e.dataTransfer.setData("text/plain", "image");
                e.target.classList.add("dragging");
            }
        });

        preview.addEventListener("dragend", (e) => {
            if (e.target.classList.contains("thumb")) {
                e.target.classList.remove("dragging");
                trash.classList.remove("active");
            }
        });

        trash.addEventListener("dragover", (e) => {
            e.preventDefault();
            trash.classList.add("active");
        });

        trash.addEventListener("dragleave", () => {
            trash.classList.remove("active");
        });

        trash.addEventListener("drop", (e) => {
            e.preventDefault();
            const dragging = document.querySelector(".dragging");

            if (dragging) {
                dragging.remove();
                images = Array.from(preview.children);
                updateDuration();
            }

            trash.classList.remove("active");
        });

        // EXPORT
        document.getElementById("export").addEventListener("click", async () => {
            if (images.length === 0) {
                alert("Upload images first");
                return;
            }

            const exportBtn = document.getElementById("export");
            exportBtn.disabled = true;

            const fps = parseFloat(fpsInput.value) || 1;
            const delay = 1000 / fps;

            status.textContent = "Preparing GIF worker...";

            try {
                // Fetch the worker to bypass cross-origin worker restrictions when opening locally
                let workerScriptUrl = "gif.worker.js";
                try {
                    const response = await fetch("https://cdn.jsdelivr.net/npm/gif.js.optimized/dist/gif.worker.js");
                    if (response.ok) {
                        const text = await response.text();
                        const blob = new Blob([text], { type: "application/javascript" });
                        workerScriptUrl = URL.createObjectURL(blob);
                    }
                } catch (e) {
                    console.warn("Could not fetch worker from CDN, falling back to local file", e);
                }

                status.textContent = "Rendering GIF... 0%";

                const gif = new GIF({
                    // Use hardware concurrency to speed up rendering with available CPU cores
                    workers: navigator.hardwareConcurrency || 2,
                    quality: 10,
                    workerScript: workerScriptUrl
                });

                // Get images in their current visual order from the preview container
                const currentImages = Array.from(preview.children);

                // Use the first image's full original resolution to keep highest quality
                let width = currentImages[0].naturalWidth || currentImages[0].width;
                let height = currentImages[0].naturalHeight || currentImages[0].height;

                currentImages.forEach(img => {
                    const canvas = document.createElement("canvas");
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext("2d");

                    // Fill background just in case there are transparent images
                    ctx.fillStyle = "white";
                    ctx.fillRect(0, 0, width, height);

                    ctx.drawImage(img, 0, 0, width, height);
                    gif.addFrame(canvas, { delay, copy: true });
                });

                gif.on("progress", p => {
                    status.textContent = `Rendering GIF... ${Math.round(p * 100)}%`;
                });

                gif.on("finished", blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "animation.gif";
                    a.click();

                    status.textContent = "Done!";
                    exportBtn.disabled = false;
                });

                gif.render();
            } catch (error) {
                console.error(error);
                status.textContent = "Error rendering GIF!";
                exportBtn.disabled = false;
            }
        });

        // EXPORT VIDEO (WebM via native MediaRecorder)
        document.getElementById("export-video").addEventListener("click", async () => {
            if (images.length === 0) {
                alert("Upload images first");
                return;
            }

            const exportBtn = document.getElementById("export-video");
            exportBtn.disabled = true;

            const fps = parseFloat(fpsInput.value) || 1;
            const currentImages = Array.from(preview.children);

            status.textContent = "Recording video... (This process takes real-time)";

            try {
                // Use the first image's full original resolution
                let width = currentImages[0].naturalWidth || currentImages[0].width;
                let height = currentImages[0].naturalHeight || currentImages[0].height;

                const canvas = document.createElement("canvas");
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d");

                // Capture canvas at a standard framerate
                const stream = canvas.captureStream(30);

                // Fallback from vp9 to vp8 if not supported
                let mimeType = 'video/webm; codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm';
                }

                // Request a very high bitrate (25 Mbps) so it preserves the original quality
                const mediaRecorder = new MediaRecorder(stream, {
                    mimeType,
                    videoBitsPerSecond: 25000000
                });

                const chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "animation.webm";
                    a.click();

                    status.textContent = "Video export complete!";
                    exportBtn.disabled = false;
                };

                mediaRecorder.start();

                // Draw frames with real-time delay so MediaRecorder captures the correct pacing
                const delayMs = 1000 / fps;
                for (let i = 0; i < currentImages.length; i++) {
                    ctx.fillStyle = "black";
                    ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(currentImages[i], 0, 0, width, height);

                    status.textContent = `Recording frame ${i + 1} of ${currentImages.length}...`;

                    // Wait for the duration of one frame
                    await new Promise(resolve => setTimeout(resolve, delayMs));
                }

                // Give MediaRecorder a tiny bit of extra time to capture the final frame
                await new Promise(resolve => setTimeout(resolve, 50));

                mediaRecorder.stop();
            } catch (error) {
                console.error(error);
                status.textContent = "Error rendering Video!";
                exportBtn.disabled = false;
            }
        });
    </script>

</body>

</html>
